site_name: Python Learning
site_url: https://blackat.github.io/python-learning/
site_description: My personal Python learning journal — theory, examples, and exercises.
docs_dir: docs
exclude_docs: |
  .venv/
  dist/
  src/lessons/*/exercises/
  **/__pycache__/
  **/*.pyc

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - toc.integrate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Chapters:
    - OOP:
      - Foundation: ch01_oop/notes_01_foundation.md
      - Advanced: ch01_oop/notes_02_advanced.md